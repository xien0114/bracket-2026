<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NBA 2026 플레이오프 브래킷</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--s1:#161b27;--s2:#1c2333;
  --bd:#30384f;--tx:#e6eaf4;--mu:#6e7a9a;
  --blue:#1d428a;--red:#c8102e;--gold:#ffc72c;--green:#22c55e;
  --card-w:200px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* ── 헤더 ── */
header{background:linear-gradient(135deg,#0d1f4d,#1a0a2e);border-bottom:2px solid var(--gold);
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200}
header h1{font-size:0.95rem;font-weight:700}
.uchip{background:rgba(255,199,44,.12);border:1px solid rgba(255,199,44,.3);color:var(--gold);
  padding:5px 12px;border-radius:20px;font-size:0.78rem;cursor:pointer;display:none;
  white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis}

/* ── 풀스크린 중앙 카드 ── */
.screen-center{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 54px)}
.acard{background:var(--s1);border:1px solid var(--bd);border-radius:18px;
  padding:36px 32px;width:100%;max-width:380px;margin:16px}
.acard .ico{text-align:center;font-size:2.8rem;margin-bottom:6px}
.acard h2{text-align:center;font-size:1.2rem;margin-bottom:4px}
.acard p{text-align:center;color:var(--mu);font-size:0.82rem;margin-bottom:22px}

/* ── 버튼 ── */
.btn{padding:11px 18px;border:none;border-radius:9px;font-size:0.88rem;font-weight:600;
  cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:8px}
.btn:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:default;transform:none!important}
.btn-full{width:100%;justify-content:center}
.btn-blue{background:var(--blue);color:#fff}
.btn-gold{background:var(--gold);color:#111}
.btn-ghost{background:transparent;border:1px solid var(--bd);color:var(--tx)}
.btn-google{background:#fff;color:#333;border:1px solid #ddd;font-size:0.9rem;
  width:100%;justify-content:center;padding:13px;border-radius:10px}
.btn-google:hover:not(:disabled){background:#f5f5f5;transform:translateY(-1px)}
.google-icon{width:20px;height:20px;flex-shrink:0}

/* 입력 */
.fld{margin-bottom:14px}
.fld label{display:block;font-size:0.75rem;color:var(--mu);margin-bottom:5px}
.fld input{width:100%;padding:11px 13px;background:var(--bg);border:1px solid var(--bd);
  color:var(--tx);border-radius:8px;font-size:0.9rem;transition:border-color .2s}
.fld input:focus{outline:none;border-color:var(--gold)}
.toast{padding:8px 0;font-size:0.82rem;text-align:center;min-height:28px}
.toast.err{color:#f87171}.toast.ok{color:var(--green)}
.divider{text-align:center;color:var(--mu);font-size:0.75rem;margin:12px 0;
  display:flex;align-items:center;gap:8px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bd)}

/* ── 메인 ── */
#main-screen{display:none;padding-bottom:64px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--bd);display:flex;z-index:200}
.nbtn{flex:1;padding:11px 6px;background:transparent;border:none;color:var(--mu);cursor:pointer;
  font-size:0.68rem;display:flex;flex-direction:column;align-items:center;gap:2px}
.nbtn .ic{font-size:1.2rem}
.nbtn.on{color:var(--gold)}
.panel{display:none;padding:14px}
.panel.on{display:block}

/* ── 브래킷 패널 ── */
.bnotice{background:rgba(255,199,44,.08);border:1px solid rgba(255,199,44,.2);
  border-radius:9px;padding:10px 14px;font-size:0.8rem;color:var(--gold);
  margin-bottom:12px;line-height:1.5}
.bnotice.ok{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.25);color:var(--green)}
.save-bar{display:flex;align-items:center;gap:10px;background:var(--s1);border:1px solid var(--bd);
  border-radius:10px;padding:10px 14px;margin-bottom:14px}
.save-bar .prog{flex:1;font-size:0.8rem;color:var(--mu)}
.save-bar .prog b{color:var(--gold)}

/* ── 브래킷 스크롤 ── */
.bracket-scroll{overflow-x:auto;overflow-y:visible;padding:8px 0 20px;-webkit-overflow-scrolling:touch}
.bracket-arena{display:flex;align-items:stretch;gap:0;position:relative;
  min-height:580px;width:max-content;margin:0 auto}

/* 컬럼 헤더 */
.round-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;
  color:var(--mu);text-align:center;padding:0 0 8px;white-space:nowrap}
.round-label.gold{color:var(--gold)}

/* 라운드 컬럼 */
.rcol{display:flex;flex-direction:column;align-items:center;justify-content:space-around;
  width:calc(var(--card-w) + 20px);flex-shrink:0;align-self:stretch;position:relative;z-index:2}
/* 1라운드는 카드 4개라 gap 추가 */
#cw1 .mc, #ce1 .mc{margin-bottom:8px}
#cw1 .mc:last-child, #ce1 .mc:last-child{margin-bottom:0}
.finals-center{display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:calc(var(--card-w) + 30px);flex-shrink:0;position:relative;z-index:2;padding:0 8px}

/* ── 경기 카드 ── */
.mc{background:var(--s1);border:1.5px solid var(--bd);border-radius:10px;
  overflow:hidden;width:var(--card-w);transition:border-color .2s}
.mc.hp{border-color:rgba(255,199,44,.45)}
.mc.locked{opacity:.78}
.mc-hdr{padding:5px 10px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--bd);
  font-size:0.65rem;color:var(--mu);display:flex;justify-content:space-between;align-items:center}
.bgl{background:var(--red);color:#fff;padding:1px 7px;border-radius:10px;font-size:0.6rem}
.bgd{background:#1b7a4a;color:#fff;padding:1px 7px;border-radius:10px;font-size:0.6rem}
.bgs{background:rgba(255,199,44,.2);color:var(--gold);padding:1px 7px;border-radius:10px;font-size:0.6rem}

/* 팀 버튼 */
.tb{width:100%;padding:10px;background:transparent;border:none;color:var(--tx);
  display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.8rem;text-align:left;
  transition:background .12s;border-bottom:1px solid var(--bd);position:relative}
.tb:last-of-type{border-bottom:none}
.tb:hover:not(:disabled){background:rgba(255,255,255,.04)}
.tb.picked{font-weight:600}
.tb.winner-r{background:rgba(34,197,94,.08)}
.tb.loser-r{opacity:.3}
.tb.inferred .tn{color:var(--mu);font-style:italic}
.tb:disabled{cursor:default}
.tb .lg{width:28px;height:28px;border-radius:50%;object-fit:contain;flex-shrink:0;background:rgba(255,255,255,.04)}
.tb .lph{width:28px;height:28px;border-radius:50%;background:var(--s2);display:flex;
  align-items:center;justify-content:center;font-size:0.52rem;color:var(--mu);flex-shrink:0;text-align:center}
.tb .tn{flex:1;line-height:1.2;font-size:0.78rem}
.tb .tn.nd{color:var(--mu);font-style:italic;font-size:0.72rem}
.tb .ic2{font-size:0.82rem;flex-shrink:0}
/* 저장된 픽 잠금 표시 */
.tb .saved-lock{color:rgba(255,199,44,.5);font-size:0.72rem;flex-shrink:0}

/* ── 픽률 바 (개선) ── */
.pr-wrap{border-top:1px solid var(--bd)}
.pr-bar{display:flex;height:8px;overflow:hidden;border-radius:0 0 0 0}
.pr-b1{transition:width .4s;flex-shrink:0}
.pr-b2{transition:width .4s;flex:1}
.pr-labels{display:flex;justify-content:space-between;padding:4px 8px 5px;
  font-size:0.68rem;font-weight:600;background:rgba(255,255,255,.02)}
.pr-lbl1{color:var(--tx)}
.pr-lbl2{color:var(--tx);text-align:right}

/* ── 파이널 스코어 ── */
.fscore{padding:10px;background:rgba(200,16,46,.06);border-top:1px solid var(--bd)}
.fscore .fl{font-size:0.68rem;color:var(--mu);margin-bottom:7px}
.schips{display:flex;gap:5px;flex-wrap:nowrap}
.sc{padding:5px 10px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);
  border-radius:16px;font-size:0.78rem;cursor:pointer;transition:all .12s;white-space:nowrap}
.sc.on{background:var(--red);border-color:var(--red);color:#fff;font-weight:700}
.sc:disabled{cursor:default}
.sc-result{font-size:0.7rem;color:var(--gold);margin-top:5px}

/* SVG 오버레이 */
#blines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:visible}

/* ── 순위표 ── */
.lb-wrap{max-width:580px;margin:0 auto}
.lb-refresh{display:flex;align-items:center;gap:6px;margin-bottom:10px;font-size:0.8rem;color:var(--mu)}
.lb-refresh button{background:none;border:none;color:var(--mu);cursor:pointer;font-size:1rem}
.lb-hdr{display:grid;grid-template-columns:44px 1fr 60px 60px;
  padding:9px 12px;font-size:0.72rem;color:var(--mu);border-bottom:1px solid var(--bd)}
.lb-row{display:grid;grid-template-columns:44px 1fr 60px 60px;
  padding:10px 12px;border-bottom:1px solid var(--bd);font-size:0.85rem}
.lb-row.me{background:rgba(29,66,138,.18)}
.lb-row:hover{background:rgba(255,255,255,.02)}
.rno{font-weight:700;text-align:center}
.r1c{color:var(--gold)}.r2c{color:#c0c0c0}.r3c{color:#cd7f32}
.sc-cell{color:var(--gold);font-weight:700;text-align:right}
.cr-cell{color:var(--mu);font-size:0.78rem;text-align:right}

/* ── 내 예측 ── */
.mp-wrap{max-width:580px;margin:0 auto}
.mp-rhdr{font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--mu);
  margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.mp-card{background:var(--s1);border:1px solid var(--bd);border-radius:9px;
  padding:11px 13px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.mp-match{font-size:0.72rem;color:var(--mu);margin-bottom:2px}
.mp-team{font-size:0.88rem;font-weight:600}
.mp-sub{font-size:0.68rem;color:var(--mu);margin-top:2px}
.rb{padding:3px 9px;border-radius:14px;font-size:0.75rem;font-weight:700;white-space:nowrap}
.rb-ok{background:rgba(34,197,94,.15);color:var(--green)}
.rb-no{background:rgba(200,16,46,.15);color:#f87171}
.rb-wt{background:rgba(110,122,154,.12);color:var(--mu)}
.my-total{text-align:right;padding:12px 0;font-size:1.05rem;color:var(--gold);
  font-weight:700;border-top:1px solid var(--bd);margin-top:6px}

.spin-c{text-align:center;padding:40px}
.sp{display:inline-block;width:26px;height:26px;border:3px solid var(--bd);
  border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:36px;color:var(--mu);font-size:0.88rem}
</style>
</head>
<body>

<header>
  <h1>🏀 <span id="ev-title">NBA 2026 플레이오프 브래킷</span></h1>
  <div class="uchip" id="uchip" onclick="logout()">👤 <span id="unick"></span> ✕</div>
</header>

<!-- ① 로그인 화면 -->
<div class="screen-center" id="login-screen">
  <div class="acard">
    <div class="ico">🏆</div>
    <h2>브래킷 이벤트</h2>
    <p>Google 계정으로 참가하세요</p>
    <button class="btn-google" id="google-btn" onclick="signInGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google로 로그인
    </button>
    <div class="toast" id="ltoast"></div>
  </div>
</div>

<!-- ② 닉네임 설정 화면 (최초 1회) -->
<div class="screen-center" id="nick-screen" style="display:none">
  <div class="acard">
    <div class="ico">👤</div>
    <h2>닉네임 설정</h2>
    <p>이벤트에 표시될 닉네임을 입력하세요<br><span style="font-size:0.78rem;color:var(--mu)">이후 변경 불가합니다</span></p>
    <div class="fld">
      <label>닉네임 (최대 20자)</label>
      <input id="setup-nick" placeholder="닉네임 입력" maxlength="20" onkeydown="if(event.key==='Enter')saveNickname()">
    </div>
    <button class="btn btn-gold btn-full" id="nick-btn" onclick="saveNickname()">시작하기</button>
    <div class="toast" id="ntoast"></div>
  </div>
</div>

<!-- ③ 메인 -->
<div id="main-screen">

  <!-- 브래킷 패널 -->
  <div class="panel on" id="panel-bracket">
    <div class="bnotice" id="bnotice">⏳ 불러오는 중...</div>
    <div class="save-bar" id="save-bar" style="display:none">
      <div class="prog"><b id="p-done">0</b> / <b id="p-total">0</b> 경기 예측 완료</div>
      <button class="btn btn-gold" id="save-btn" onclick="submitPicks()">💾 저장</button>
    </div>
    <div class="bracket-scroll">
      <div class="bracket-arena" id="bracket-arena">
        <svg id="blines"></svg>
      </div>
    </div>
  </div>

  <!-- 내 예측 패널 -->
  <div class="panel" id="panel-mypicks">
    <div class="mp-wrap">
      <div style="font-size:1rem;font-weight:700;margin-bottom:14px">✅ 내 예측</div>
      <div id="mp-body"><div class="spin-c"><div class="sp"></div></div></div>
    </div>
  </div>

  <!-- 순위표 패널 -->
  <div class="panel" id="panel-lb">
    <div class="lb-wrap">
      <div class="lb-refresh">
        <span>🏆 실시간 순위표</span>
        <button onclick="loadLb()" title="새로고침">🔄</button>
        <span id="lb-ts" style="font-size:0.72rem"></span>
      </div>
      <div id="lb-body"><div class="spin-c"><div class="sp"></div></div></div>
    </div>
  </div>

  <nav class="bnav">
    <button class="nbtn on" onclick="showPanel('bracket',this)"><span class="ic">📋</span>브래킷</button>
    <button class="nbtn" onclick="showPanel('mypicks',this)"><span class="ic">✅</span>내 예측</button>
    <button class="nbtn" onclick="showPanel('lb',this)"><span class="ic">🏆</span>순위표</button>
  </nav>
</div>

<script>

const SUPABASE_URL  = 'https://oqlbyscmeqoyepevnpwr.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xbGJ5c2NtZXFveWVwZXZucHdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNTc1NDYsImV4cCI6MjA5MTczMzU0Nn0.GlUepyFe0jeo7q2o5pxzzi1V9W-nI85_fosMu-rB5jg';

// 배경색 밝기 계산 → 글씨 흰/검 자동
function textOnColor(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000 > 128 ? '#111' : '#fff';
}

const RNAME={1:'1라운드',2:'세미파이널',3:'컨퍼런스 파이널',4:'🏆 파이널'};
const SCORES=['4-0','4-1','4-2','4-3'];

let CU=null, authUser=null;
let games=[], savedPicks={}, localPicks={}, pickRates={}, settings={};

async function getIP(){try{const r=await fetch('https://api.ipify.org?format=json');const d=await r.json();return d.ip;}catch{return null;}}

// OAuth 콜백 + 세션 복원 처리
let _authHandling = false;
sb.auth.onAuthStateChange(async(event, session)=>{
  if(event==='SIGNED_OUT'){CU=null;authUser=null;return;}
  if(session?.user && !CU && !_authHandling){
    _authHandling = true;
    authUser = session.user;
    await handleAuthUser(session.user);
    _authHandling = false;
  }
  // 토큰 자동 갱신 이벤트 - 세션 유지
  if(event==='TOKEN_REFRESHED' && session?.user && CU){
    authUser = session.user;
  }
});

async function handleAuthUser(au){
  const{data,error}=await sb.from('users').select('*').eq('id',au.id).single();
  if(data&&!error){
    CU=data; initMain();
  } else {
    // 최초 로그인 → 닉네임 설정
    showNickScreen();
  }
}

function showNickScreen(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('nick-screen').style.display='flex';
}

async function saveNickname(){
  const nick=document.getElementById('setup-nick').value.trim();
  if(!nick)return toast('ntoast','닉네임을 입력하세요.');
  if(nick.length>20)return toast('ntoast','20자 이내로 입력하세요.');
  const btn=document.getElementById('nick-btn');
  btn.disabled=true; btn.textContent='저장 중...';
  try{
    const ip=await getIP();
    const{data,error}=await sb.from('users').insert({
      id:authUser.id, nickname:nick,
      email:authUser.email, ip_address:ip
    }).select().single();
    if(error){
      if(error.code==='23505')toast('ntoast','이미 사용 중인 닉네임입니다.');
      else toast('ntoast','오류: '+error.message);
      btn.disabled=false; btn.textContent='시작하기'; return;
    }
    CU=data; initMain();
  }catch(e){toast('ntoast','오류: '+e.message);btn.disabled=false;btn.textContent='시작하기';}
}

function logout(){
  if(!confirm('로그아웃 하시겠습니까?'))return;
  sb.auth.signOut();
  CU=null; authUser=null;
  location.reload();
}

// ── 메인 초기화 ──────────────────────────────
async function initMain(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('nick-screen').style.display='none';
  document.getElementById('main-screen').style.display='block';
  document.getElementById('uchip').style.display='';
  document.getElementById('unick').textContent=CU.nickname;
  try{await loadSettings(); await loadAll();}catch(e){console.error(e);}
  renderBracket();
}

async function loadSettings(){
  const{data}=await sb.from('settings').select('*');
  if(!data)return;
  data.forEach(r=>settings[r.key]=r.value);
  if(settings.event_title)document.getElementById('ev-title').textContent=settings.event_title;
}

async function loadAll(){
  const[g,p,pr]=await Promise.all([
    sb.from('games').select('*').order('round').order('game_order'),
    sb.from('picks').select('*').eq('user_id',CU.id),
    sb.from('pickrate_view').select('*'),
  ]);
  games=g.data||[];
  // savedPicks는 DB에 저장된 것만 (수정 불가 기준)
  savedPicks={};
  (p.data||[]).forEach(pk=>{
    savedPicks[pk.game_id]=pk;
    // localPicks는 savedPicks로 초기화 (UI에 반영)
    if(!localPicks[pk.game_id])localPicks[pk.game_id]={picked_winner:pk.picked_winner,finals_score:pk.finals_score};
  });
  pickRates={};
  (pr.data||[]).forEach(r=>{
    if(!pickRates[r.game_id])pickRates[r.game_id]={};
    pickRates[r.game_id][r.picked_winner]={count:r.pick_count,pct:parseFloat(r.pct)};
  });
}

// ── 브래킷 렌더링 ────────────────────────────
function renderBracket(){
  const arena=document.getElementById('bracket-arena');
  const showPR=settings.show_pickrate==='true';

  if(!games.length){
    document.getElementById('bnotice').textContent='⏳ 관리자가 브래킷을 설정 중입니다.';
    document.getElementById('save-bar').style.display='none';
    arena.innerHTML='<svg id="blines"></svg>'; return;
  }

  const notice=document.getElementById('bnotice');
  const lockable=games.filter(g=>g.team1&&g.team2&&g.team1!=='TBD'&&g.team2!=='TBD'&&!g.is_locked&&!g.winner);
  if(!lockable.length){
    notice.textContent='🔒 예측이 마감되었습니다.';
    notice.className='bnotice';
  } else {
    notice.innerHTML='⚠️ <b>1라운드부터 파이널까지</b> 전체를 예측하고 저장하세요. 저장된 예측은 수정할 수 없습니다.';
    notice.className='bnotice';
  }

  const G={WEST:{1:[],2:[],3:[]},EAST:{1:[],2:[],3:[]},FINALS:[]};
  games.forEach(g=>{
    if(g.round===4)G.FINALS.push(g);
    else if(g.conference==='WEST'&&g.round<=3)G.WEST[g.round].push(g);
    else if(g.conference==='EAST'&&g.round<=3)G.EAST[g.round].push(g);
  });
  [G.WEST[1],G.WEST[2],G.WEST[3],G.EAST[1],G.EAST[2],G.EAST[3]].forEach(arr=>arr.sort((a,b)=>a.game_order-b.game_order));

  const proj=calcProj();
  const showPRfn=g=>showPR||(settings.pickrate_after_lock==='true'&&g.is_locked);

  function col(id,label,arr,gold=false){
    return`<div class="rcol" id="${id}"><div class="round-label${gold?' gold':''}">${label}</div>${arr.map(g=>mcCard(g,proj,showPRfn(g))).join('')}</div>`;
  }
  const fg=G.FINALS[0];
  const finHtml=`<div class="finals-center"><div class="round-label gold">🏆 파이널</div>${fg?mcCard(fg,proj,showPRfn(fg)):'<div class="mc"><div class="mc-hdr">대기중</div></div>'}</div>`;

  arena.innerHTML=`<svg id="blines"></svg>`+
    col('cw1','1라운드',G.WEST[1])+col('cw2','세미파이널',G.WEST[2])+col('cw3','컨퍼런스 파이널',G.WEST[3],true)+
    finHtml+
    col('ce3','컨퍼런스 파이널',G.EAST[3],true)+col('ce2','세미파이널',G.EAST[2])+col('ce1','1라운드',G.EAST[1]);

  updateSaveBar();
  requestAnimationFrame(()=>requestAnimationFrame(drawLines));
}

// ── 경기 카드 HTML ───────────────────────────
function mcCard(game,proj,showPR){
  const lPick=localPicks[game.id];
  const sPick=savedPicks[game.id]; // DB 저장된 픽
  // 저장된 픽이 있으면 해당 게임은 잠금
  const gameLocked=game.is_locked||!!game.winner||!!sPick;

  const t1=teamInfo(game,'team1',proj);
  const t2=teamInfo(game,'team2',proj);

  let cls='mc'+(lPick?.picked_winner?' hp':'')+(gameLocked?' locked':'');
  let html=`<div class="${cls}" id="mc-${game.id}">`;
  html+=`<div class="mc-hdr"><span>${game.conference||''}${game.round===4?'':' R'+game.round}</span>`;
  if(game.winner)html+=`<span class="bgd">결과발표</span>`;
  else if(sPick)html+=`<span class="bgs">✓ 저장됨</span>`;
  else if(game.is_locked)html+=`<span class="bgl">🔒</span>`;
  html+='</div>';

  if(!t1&&!t2){
    // 2팀 높이 유지하면서 안내 문구 표시
    html+=`<button class="tb" disabled style="opacity:0.4">
      <div class="lph">?</div><span class="tn nd">이전 라운드를 먼저 예측하세요</span>
    </button>
    <button class="tb" disabled style="opacity:0.4">
      <div class="lph">?</div><span class="tn nd">&nbsp;</span>
    </button>`;
  } else {
    [t1,t2].forEach((ti)=>{
      if(!ti){html+=`<button class="tb" disabled style="opacity:0.35"><div class="lph">?</div><span class="tn nd">대기중</span></button>`;return;}
      const isPicked=lPick?.picked_winner===ti.name;
      const isWinner=game.winner===ti.name;
      const isLoser=game.winner&&game.winner!==ti.name;
      const isSavedPick=sPick?.picked_winner===ti.name;

      let cls2='tb';
      if(isPicked)cls2+=' picked';
      if(isWinner)cls2+=' winner-r';
      if(isLoser)cls2+=' loser-r';
      if(!ti.fixed)cls2+=' inferred';

      const lgSrc=ti.logo;
      const lgHtml=lgSrc?`<img class="lg" src="${lgSrc}" onerror="this.parentElement.innerHTML='<div class=\\'lph\\'>${ti.name.split(' ').map(w=>w[0]).slice(0,3).join('')}</div>'">`:`<div class="lph">${ti.name.split(' ').map(w=>w[0]).slice(0,3).join('')}</div>`;

      let icon='';
      if(game.winner&&sPick?.picked_winner===ti.name)icon=sPick.is_correct?'<span class="ic2">✅</span>':'<span class="ic2">❌</span>';
      else if(isPicked&&!gameLocked)icon='<span class="ic2" style="color:var(--gold)">★</span>';
      else if(isPicked&&gameLocked&&sPick)icon='<span class="saved-lock">🔒</span>';

      const pickStyle=isPicked?`background:${teamColor(ti.name)}22;border-left:3px solid ${teamColor(ti.name)}`:'';
      html+=`<button class="${cls2}" style="${pickStyle}" onclick="pickTeam(${game.id},'${ti.name.replace(/'/g,"\\'")}')" ${gameLocked?'disabled':''}>
        ${lgHtml}<span class="tn${!ti.fixed?' nd':''}">${ti.name}</span>${icon}
      </button>`;
    });
  }

  // 픽률 바 (개선)
  if(showPR&&t1&&t2){
    const pr=pickRates[game.id]||{};
    const c1=pr[t1.name]?.count||0;
    const c2=pr[t2.name]?.count||0;
    const total=c1+c2;
    if(total>0){
      const p1=Math.round(c1*100/total);
      const p2=100-p1;
      const a1=abbr(t1.name), a2=abbr(t2.name);
      const col1=teamColor(t1.name), col2=teamColor(t2.name);
      const txt1=textOnColor(col1), txt2=textOnColor(col2);
      const lbl1=`${a1} ${p1}% (${c1}명)`, lbl2=`${a2} ${p2}% (${c2}명)`;
      html+=`<div class="pr-wrap">
        <div class="pr-bar">
          <div class="pr-b1" style="width:${p1||0}%;background:${col1}"></div>
          <div class="pr-b2" style="width:${p2||0}%;background:${col2}"></div>
        </div>
        <div class="pr-labels">
          <span class="pr-lbl1" style="color:${col1}">${lbl1}</span>
          <span class="pr-lbl2" style="color:${col2}">${lbl2}</span>
        </div>
      </div>`;
    }
  }

  // 파이널 스코어
  if(game.round===4&&t1&&t2){
    const sel=lPick?.finals_score;
    html+=`<div class="fscore"><div class="fl">시리즈 스코어 예측</div>
      <div class="schips">${SCORES.map(s=>`<button class="sc${sel===s?' on':''}"
        onclick="pickScore(${game.id},'${s}')" ${gameLocked?'disabled':''}>${s}</button>`).join('')}</div>
      ${game.finals_score?`<div class="sc-result">실제 결과: ${game.finals_score}</div>`:''}
    </div>`;
  }

  html+='</div>';
  return html;
}

// ── 팀 정보 ──────────────────────────────────
function teamInfo(game,slot,proj){
  const dbTeam=game[slot];
  const dbLogo=game[slot+'_logo'];
  if(dbTeam&&dbTeam!=='TBD')return{name:dbTeam,logo:logo(dbTeam,dbLogo),fixed:true};
  const slotNum=slot==='team1'?1:2;
  const p=proj[`${game.id}_${slotNum}`];
  if(p)return{name:p.name,logo:logo(p.name,null),fixed:false};
  return null;
}

// ── 픽 전파 계산 ─────────────────────────────
function calcProj(){
  const proj={};
  function win(conf,round,order){
    const g=games.find(x=>x.conference===conf&&x.round===round&&x.game_order===order);
    if(!g)return null;
    const w=g.winner||(localPicks[g.id]?.picked_winner);
    if(!w)return null;
    return{name:w,logo:logo(w,null)};
  }
  ['WEST','EAST'].forEach(conf=>{
    const r2a=games.find(x=>x.conference===conf&&x.round===2&&x.game_order===1);
    const r2b=games.find(x=>x.conference===conf&&x.round===2&&x.game_order===2);
    const r3 =games.find(x=>x.conference===conf&&x.round===3);
    if(r2a){const a=win(conf,1,1);if(a)proj[`${r2a.id}_1`]=a;const b=win(conf,1,2);if(b)proj[`${r2a.id}_2`]=b;}
    if(r2b){const c=win(conf,1,3);if(c)proj[`${r2b.id}_1`]=c;const d=win(conf,1,4);if(d)proj[`${r2b.id}_2`]=d;}
    if(r3) {const e=win(conf,2,1);if(e)proj[`${r3.id}_1`] =e;const f=win(conf,2,2);if(f)proj[`${r3.id}_2`] =f;}
  });
  const fin=games.find(x=>x.round===4);
  if(fin){const w=win('WEST',3,1);if(w)proj[`${fin.id}_1`]=w;const e=win('EAST',3,1);if(e)proj[`${fin.id}_2`]=e;}
  return proj;
}

// ── 픽 선택 (저장된 픽 변경 불가) ─────────────
function pickTeam(gameId,team){
  if(savedPicks[gameId])return; // 저장된 픽 수정 불가
  if(!localPicks[gameId])localPicks[gameId]={};
  localPicks[gameId].picked_winner=team;
  renderBracket();
}

function pickScore(gameId,score){
  if(savedPicks[gameId])return; // 저장된 픽 수정 불가
  if(!localPicks[gameId])localPicks[gameId]={};
  localPicks[gameId].finals_score=score;
  const game=games.find(g=>g.id===gameId);
  const proj=calcProj();
  const showPR=settings.show_pickrate==='true'||(settings.pickrate_after_lock==='true'&&game.is_locked);
  const card=document.getElementById(`mc-${gameId}`);
  if(card){const tmp=document.createElement('div');tmp.innerHTML=mcCard(game,proj,showPR);card.replaceWith(tmp.firstChild);}
  updateSaveBar();
}

function updateSaveBar(){
  const bar=document.getElementById('save-bar');
  const proj=calcProj();
  const total=games.length||15; // 항상 전체 경기수(15) 기준
  const pickable=games.filter(g=>{
    if(g.is_locked||g.winner||savedPicks[g.id])return false;
    const t1ok=(g.team1&&g.team1!=='TBD')||!!proj[`${g.id}_1`];
    const t2ok=(g.team2&&g.team2!=='TBD')||!!proj[`${g.id}_2`];
    return t1ok&&t2ok;
  });
  // 저장 완료된 것 + 미저장 픽된 것 합산
  const savedCount=Object.keys(savedPicks).length;
  const newDone=pickable.filter(g=>localPicks[g.id]?.picked_winner).length;
  const done=savedCount+newDone;
  if(!pickable.length&&!done){bar.style.display='none';return;}
  bar.style.display='flex';
  document.getElementById('p-done').textContent=done;
  document.getElementById('p-total').textContent=total;
}

async function submitPicks(){
  const btn=document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='저장 중...';
  // 저장 안 된 픽만 추출
  const rows=Object.entries(localPicks)
    .filter(([gid,p])=>p.picked_winner&&!savedPicks[parseInt(gid)])
    .map(([gid,p])=>({user_id:CU.id,game_id:parseInt(gid),picked_winner:p.picked_winner,finals_score:p.finals_score||null,updated_at:new Date().toISOString()}));
  if(!rows.length){alert('새로 추가된 예측이 없습니다.');btn.disabled=false;btn.textContent='💾 저장';return;}
  const{error}=await sb.from('picks').upsert(rows,{onConflict:'user_id,game_id'});
  if(error)alert('저장 실패: '+error.message);
  else{await loadAll();renderBracket();alert(`✅ ${rows.length}개 예측 저장!\n저장된 예측은 수정할 수 없습니다.`);}
  btn.disabled=false; btn.textContent='💾 저장';
}

// ── SVG 연결선 ───────────────────────────────
function drawLines(){
  const arena=document.getElementById('bracket-arena');
  const svg=document.getElementById('blines');
  if(!arena||!svg)return;
  svg.innerHTML='';
  const ar=arena.getBoundingClientRect();
  svg.setAttribute('viewBox',`0 0 ${ar.width} ${ar.height}`);

  const pairs=[];
  ['WEST','EAST'].forEach(conf=>{
    const isE=conf==='EAST';
    const r1=games.filter(x=>x.conference===conf&&x.round===1).sort((a,b)=>a.game_order-b.game_order);
    const r2=games.filter(x=>x.conference===conf&&x.round===2).sort((a,b)=>a.game_order-b.game_order);
    const r3=games.find(x=>x.conference===conf&&x.round===3);
    if(r2[0]&&r1[0])pairs.push([r1[0].id,r2[0].id,isE]);
    if(r2[0]&&r1[1])pairs.push([r1[1].id,r2[0].id,isE]);
    if(r2[1]&&r1[2])pairs.push([r1[2].id,r2[1].id,isE]);
    if(r2[1]&&r1[3])pairs.push([r1[3].id,r2[1].id,isE]);
    if(r3&&r2[0])pairs.push([r2[0].id,r3.id,isE]);
    if(r3&&r2[1])pairs.push([r2[1].id,r3.id,isE]);
    const fin=games.find(x=>x.round===4);
    if(fin&&r3)pairs.push([r3.id,fin.id,isE]);
  });

  pairs.forEach(([fromId,toId,isEast])=>{
    const from=document.getElementById(`mc-${fromId}`);
    const to=document.getElementById(`mc-${toId}`);
    if(!from||!to)return;
    const fr=from.getBoundingClientRect();
    const tr=to.getBoundingClientRect();
    const x1=isEast?fr.left-ar.left:fr.right-ar.left;
    const y1=fr.top+fr.height/2-ar.top;
    const x2=isEast?tr.right-ar.left:tr.left-ar.left;
    const y2=tr.top+tr.height/2-ar.top;
    const mx=(x1+x2)/2;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${x1},${y1} H${mx} V${y2} H${x2}`);
    path.setAttribute('stroke','#2a3550');
    path.setAttribute('stroke-width','1.5');
    path.setAttribute('fill','none');
    path.setAttribute('stroke-linecap','round');
    svg.appendChild(path);
  });
}

    html+=`<div class="mp-rhdr">${RNAME[r]}</div>`;
    rg.forEach(game=>{
      const pk=savedPicks[game.id];
      let badge=`<span class="rb rb-wt">⏳</span>`;
      if(game.winner){
        if(pk.is_correct){let pt=W[game.round];if(game.round===4&&pk.finals_score===game.finals_score)pt+=4;total+=pt;badge=`<span class="rb rb-ok">+${pt}점</span>`;}
        else badge=`<span class="rb rb-no">❌</span>`;
      }
      html+=`<div class="mp-card"><div>
        <div class="mp-match">${game.team1||'?'} vs ${game.team2||'?'}</div>
        <div class="mp-team">${pk.picked_winner}${pk.finals_score?' ('+pk.finals_score+')':''}</div>
        ${game.winner?`<div class="mp-sub">실제: ${game.winner}${game.finals_score?' '+game.finals_score:''}</div>`:''}
      </div>${badge}</div>`;
    });
  });
  html+=`<div class="my-total">누적 점수: ${total}점</div>`;
  body.innerHTML=html;
}

// ── 순위표 ───────────────────────────────────
async function loadLb(){
  const body=document.getElementById('lb-body');
  body.innerHTML='<div class="spin-c"><div class="sp"></div></div>';
  const{data}=await sb.from('leaderboard').select('*');
  if(!data?.length){body.innerHTML='<div class="empty">아직 데이터 없음</div>';return;}
  let html=`<div class="lb-hdr"><span>순위</span><span>닉네임</span><span style="text-align:right">정답</span><span style="text-align:right">점수</span></div>`;
  data.forEach((row,i)=>{
    const isMe=row.nickname===CU?.nickname;
    const em=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    html+=`<div class="lb-row${isMe?' me':''}">
      <div class="rno ${i<3?`r${i+1}c`:''}">${em||i+1}</div>
      <div>${row.nickname}${isMe?' <span style="font-size:.68rem;color:var(--gold)">(나)</span>':''}</div>
      <div class="cr-cell">${row.correct}/${row.judged}</div>
      <div class="sc-cell">${row.score}</div>
    </div>`;
  });
  body.innerHTML=html;
  document.getElementById('lb-ts').textContent='방금 업데이트';
}

// ── 패널 전환 ────────────────────────────────
function showPanel(name,btn){
  ['bracket','mypicks','lb'].forEach(p=>{
    const el=document.getElementById(`panel-${p}`);
    el.classList.remove('on'); el.style.display='none';
  });
  const t=document.getElementById(`panel-${name}`);
  t.classList.add('on'); t.style.display='block';
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(name==='bracket'){updateSaveBar();requestAnimationFrame(()=>requestAnimationFrame(drawLines));}
  if(name==='lb')loadLb();
  if(name==='mypicks')renderMyPicks();
}

window.addEventListener('resize',()=>{
  if(CU&&document.getElementById('panel-bracket').classList.contains('on'))
    requestAnimationFrame(drawLines);
});

// ── 초기 로드 ─────────────────────────────────
window.onload=async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session?.user){authUser=session.user;await handleAuthUser(session.user);}
};
</script>
</body>
