<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NBA 2026 플레이오프 브래킷</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--s1:#161b27;--s2:#1c2333;
  --bd:#30384f;--tx:#e6eaf4;--mu:#6e7a9a;
  --blue:#1d428a;--red:#c8102e;--gold:#ffc72c;--green:#22c55e;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* ── 헤더 ── */
header{
  background:linear-gradient(135deg,#0d1f4d,#1a0a2e);
  border-bottom:2px solid var(--gold);padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
}
header h1{font-size:0.95rem;font-weight:700}
.uchip{background:rgba(255,199,44,.12);border:1px solid rgba(255,199,44,.3);
  color:var(--gold);padding:5px 12px;border-radius:20px;font-size:0.78rem;cursor:pointer;display:none}

/* ── 로그인 ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 54px)}
.lcard{background:var(--s1);border:1px solid var(--bd);border-radius:18px;
  padding:32px;width:100%;max-width:360px;margin:16px}
.lcard .ico{text-align:center;font-size:2.8rem;margin-bottom:4px}
.lcard h2{text-align:center;font-size:1.2rem;margin-bottom:4px}
.lcard p{text-align:center;color:var(--mu);font-size:0.82rem;margin-bottom:20px}
.trow{display:flex;background:var(--bg);border-radius:9px;padding:3px;margin-bottom:18px;gap:3px}
.tpill{flex:1;padding:8px;background:transparent;border:none;color:var(--mu);
  border-radius:7px;cursor:pointer;font-size:0.85rem;transition:all .15s}
.tpill.on{background:var(--blue);color:#fff}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:0.75rem;color:var(--mu);margin-bottom:4px}
.fld input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--bd);
  color:var(--tx);border-radius:8px;font-size:0.9rem}
.fld input:focus{outline:none;border-color:var(--gold)}
.btn{padding:11px 18px;border:none;border-radius:9px;font-size:0.88rem;font-weight:600;
  cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:default;transform:none!important}
.btn-full{width:100%;justify-content:center}
.btn-blue{background:var(--blue);color:#fff}
.btn-gold{background:var(--gold);color:#111}
.btn-ghost{background:transparent;border:1px solid var(--bd);color:var(--tx)}
.toast{padding:8px 0;font-size:0.82rem;text-align:center;min-height:28px}
.toast.err{color:#f87171}.toast.ok{color:var(--green)}

/* ── 메인 레이아웃 ── */
#main-screen{display:none;padding-bottom:64px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);
  border-top:1px solid var(--bd);display:flex;z-index:200}
.nbtn{flex:1;padding:11px 6px;background:transparent;border:none;color:var(--mu);
  cursor:pointer;font-size:0.68rem;display:flex;flex-direction:column;align-items:center;gap:2px}
.nbtn .ic{font-size:1.2rem}
.nbtn.on{color:var(--gold)}
.panel{display:none;padding:14px}
.panel.on{display:block}

/* ── 브래킷 패널 ── */
.bracket-notice{
  background:rgba(255,199,44,.08);border:1px solid rgba(255,199,44,.2);
  border-radius:9px;padding:10px 13px;font-size:0.8rem;color:var(--gold);
  margin-bottom:12px;line-height:1.5
}
.bracket-save-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--s1);border:1px solid var(--bd);
  border-radius:10px;padding:10px 14px;margin-bottom:14px
}
.bracket-save-bar .prog{flex:1;font-size:0.8rem;color:var(--mu)}
.bracket-save-bar .prog b{color:var(--gold)}

/* 브래킷 스크롤 컨테이너 */
.bracket-scroll{overflow-x:auto;overflow-y:visible;padding:8px 0 16px;
  -webkit-overflow-scrolling:touch}
.bracket-arena{
  display:flex;align-items:stretch;gap:0;
  position:relative;min-height:540px;
  width:max-content;margin:0 auto;
}

/* 라운드 컬럼 헤더 */
.round-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;
  color:var(--mu);text-align:center;padding:0 0 8px;white-space:nowrap}
.round-label.gold{color:var(--gold)}

/* 라운드 컬럼 */
.rcol{
  display:flex;flex-direction:column;align-items:center;
  justify-content:space-around;
  width:158px;flex-shrink:0;align-self:stretch;
  position:relative;z-index:2;
}


/* 파이널 센터 컬럼 */
.finals-center{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;width:178px;flex-shrink:0;
  position:relative;z-index:2;padding:0 4px;
}
.finals-center .round-label{color:var(--gold)}

/* 경기 카드 */
.mc{
  background:var(--s1);border:1.5px solid var(--bd);
  border-radius:10px;overflow:hidden;width:148px;
  transition:border-color .2s;
}
.mc.hp{border-color:rgba(255,199,44,.45)}  /* has-pick */
.mc.locked{opacity:.78}
.mc-hdr{padding:5px 9px;background:rgba(255,255,255,.02);
  border-bottom:1px solid var(--bd);font-size:0.65rem;color:var(--mu);
  display:flex;justify-content:space-between;align-items:center}
.bgl{background:var(--red);color:#fff;padding:1px 6px;border-radius:10px;font-size:0.6rem}
.bgd{background:#1b7a4a;color:#fff;padding:1px 6px;border-radius:10px;font-size:0.6rem}

/* 팀 버튼 */
.tb{
  width:100%;padding:9px 9px;background:transparent;border:none;
  color:var(--tx);display:flex;align-items:center;gap:7px;
  cursor:pointer;font-size:0.78rem;text-align:left;
  transition:background .12s;border-bottom:1px solid var(--bd);
  position:relative;
}
.tb:last-of-type{border-bottom:none}
.tb:hover:not(:disabled){background:rgba(255,255,255,.04)}
.tb.picked{background:rgba(255,199,44,.14);color:var(--gold);font-weight:600}
.tb.winner-r{background:rgba(34,197,94,.08)}
.tb.loser-r{opacity:.3}
.tb.tbd-t{cursor:default}
.tb.inferred .tn{color:var(--mu);font-style:italic}
.tb.inferred{border-left:2px solid rgba(255,199,44,0.25)}
.tb:disabled{cursor:default}
.tb .lg{width:26px;height:26px;border-radius:50%;object-fit:contain;flex-shrink:0;
  background:rgba(255,255,255,.04)}
.tb .lph{width:26px;height:26px;border-radius:50%;background:var(--s2);
  display:flex;align-items:center;justify-content:center;
  font-size:0.52rem;color:var(--mu);flex-shrink:0;line-height:1.2;text-align:center}
.tb .tn{flex:1;line-height:1.2;font-size:0.76rem}
.tb .tn.tbd-n{color:var(--mu);font-style:italic;font-size:0.7rem}
.tb .star{color:var(--gold);font-size:0.75rem;flex-shrink:0}
.tb .cok{color:var(--green);font-size:0.85rem;flex-shrink:0}
.tb .cno{color:#f87171;font-size:0.85rem;flex-shrink:0}

/* 파이널 스코어 섹션 */
.fscore{padding:9px 9px;background:rgba(200,16,46,.06);border-top:1px solid var(--bd)}
.fscore .fl{font-size:0.68rem;color:var(--mu);margin-bottom:6px}
.schips{display:flex;gap:4px;flex-wrap:wrap}
.sc{padding:4px 10px;border:1px solid var(--bd);background:var(--bg);
  color:var(--tx);border-radius:16px;font-size:0.75rem;cursor:pointer;transition:all .12s}
.sc.on{background:var(--red);border-color:var(--red);color:#fff;font-weight:700}
.sc:disabled{cursor:default}
.sc-result{font-size:0.7rem;color:var(--gold);margin-top:5px}

/* SVG 오버레이 */
#blines{position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:1;overflow:visible}

/* ── 순위표 ── */
.lb-wrap{max-width:560px;margin:0 auto}
.lb-hdr{display:grid;grid-template-columns:44px 1fr 60px 60px;
  padding:9px 12px;font-size:0.72rem;color:var(--mu);border-bottom:1px solid var(--bd)}
.lb-row{display:grid;grid-template-columns:44px 1fr 60px 60px;
  padding:10px 12px;border-bottom:1px solid var(--bd);font-size:0.85rem}
.lb-row.me{background:rgba(29,66,138,.18)}
.lb-row:hover{background:rgba(255,255,255,.02)}
.rno{font-weight:700;text-align:center}
.r1c{color:var(--gold)}.r2c{color:#c0c0c0}.r3c{color:#cd7f32}
.sc-cell{color:var(--gold);font-weight:700;text-align:right}
.cr-cell{color:var(--mu);font-size:0.78rem;text-align:right}
.lb-refresh{display:flex;align-items:center;gap:6px;margin-bottom:10px;
  font-size:0.8rem;color:var(--mu)}
.lb-refresh button{background:none;border:none;color:var(--mu);cursor:pointer;font-size:1rem}

/* ── 내 예측 ── */
.mp-wrap{max-width:560px;margin:0 auto}
.mp-rhdr{font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;
  color:var(--mu);margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.mp-card{background:var(--s1);border:1px solid var(--bd);border-radius:9px;
  padding:11px 13px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.mp-match{font-size:0.72rem;color:var(--mu);margin-bottom:2px}
.mp-team{font-size:0.88rem;font-weight:600}
.mp-sub{font-size:0.68rem;color:var(--mu);margin-top:2px}
.rb{padding:3px 9px;border-radius:14px;font-size:0.75rem;font-weight:700;white-space:nowrap}
.rb-ok{background:rgba(34,197,94,.15);color:var(--green)}
.rb-no{background:rgba(200,16,46,.15);color:#f87171}
.rb-wt{background:rgba(110,122,154,.12);color:var(--mu)}
.my-total{text-align:right;padding:12px 0;font-size:1.05rem;color:var(--gold);
  font-weight:700;border-top:1px solid var(--bd);margin-top:6px}

.spin-c{text-align:center;padding:40px}
.sp{display:inline-block;width:26px;height:26px;border:3px solid var(--bd);
  border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:36px;color:var(--mu);font-size:0.88rem}
</style>
</head>
<body>

<header>
  <h1>🏀 <span id="ev-title">NBA 2026 플레이오프 브래킷</span></h1>
  <div class="uchip" id="uchip" onclick="logout()">👤 <span id="unick"></span> ✕</div>
</header>

<!-- 로그인 -->
<div id="login-screen">
  <div class="lcard">
    <div class="ico">🏆</div>
    <h2>브래킷 이벤트</h2>
    <p>닉네임 + 4자리 PIN으로 참가</p>
    <div class="trow">
      <button class="tpill on" onclick="stab('login',this)">로그인</button>
      <button class="tpill" onclick="stab('reg',this)">신규 참가</button>
    </div>
    <div id="form-login">
      <div class="fld"><label>닉네임</label><input id="l-nick" placeholder="닉네임" maxlength="20"></div>
      <div class="fld"><label>4자리 PIN</label><input id="l-pin" type="password" placeholder="••••" maxlength="4" inputmode="numeric"></div>
      <button class="btn btn-blue btn-full" onclick="doLogin()">로그인</button>
    </div>
    <div id="form-reg" style="display:none">
      <div class="fld"><label>닉네임</label><input id="r-nick" placeholder="사용할 닉네임" maxlength="20"></div>
      <div class="fld"><label>PIN 설정</label><input id="r-pin" type="password" placeholder="숫자 4자리" maxlength="4" inputmode="numeric"></div>
      <div class="fld"><label>PIN 확인</label><input id="r-pin2" type="password" placeholder="재입력" maxlength="4" inputmode="numeric"></div>
      <button class="btn btn-gold btn-full" onclick="doReg()">참가 신청</button>
    </div>
    <div class="toast" id="ltoast"></div>
  </div>
</div>

<!-- 메인 -->
<div id="main-screen">

  <!-- 브래킷 패널 -->
  <div class="panel on" id="panel-bracket">
    <div class="bracket-notice" id="bnotice">⏳ 불러오는 중...</div>
    <div class="bracket-save-bar" id="save-bar" style="display:none">
      <div class="prog"><b id="p-done">0</b> / <b id="p-total">0</b> 경기 예측 완료</div>
      <button class="btn btn-gold" id="save-btn" onclick="submitPicks()">💾 저장</button>
    </div>
    <div class="bracket-scroll">
      <div class="bracket-arena" id="bracket-arena">
        <svg id="blines"></svg>
      </div>
    </div>
  </div>

  <!-- 내 예측 패널 -->
  <div class="panel" id="panel-mypicks">
    <div class="mp-wrap">
      <div style="font-size:1rem;font-weight:700;margin-bottom:14px">✅ 내 예측</div>
      <div id="mp-body"><div class="spin-c"><div class="sp"></div></div></div>
    </div>
  </div>

  <!-- 순위표 패널 -->
  <div class="panel" id="panel-lb">
    <div class="lb-wrap">
      <div class="lb-refresh">
        <span>🏆 실시간 순위표</span>
        <button onclick="loadLb()" title="새로고침">🔄</button>
        <span id="lb-ts" style="font-size:0.72rem"></span>
      </div>
      <div id="lb-body"><div class="spin-c"><div class="sp"></div></div></div>
    </div>
  </div>

  <nav class="bnav">
    <button class="nbtn on" onclick="showPanel('bracket',this)"><span class="ic">📋</span>브래킷</button>
    <button class="nbtn" onclick="showPanel('mypicks',this)"><span class="ic">✅</span>내 예측</button>
    <button class="nbtn" onclick="showPanel('lb',this)"><span class="ic">🏆</span>순위표</button>
  </nav>
</div>

<script>
// ── CONFIG ──────────────────────────────────
const SUPABASE_URL  = 'https://oqlbyscmeqoyepevnpwr.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xbGJ5c2NtZXFveWVwZXZucHdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNTc1NDYsImV4cCI6MjA5MTczMzU0Nn0.GlUepyFe0jeo7q2o5pxzzi1V9W-nI85_fosMu-rB5jg';
// ────────────────────────────────────────────

const {createClient} = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// ESPN 로고 자동 매핑
const LOGOS = {
  'OKC Thunder':'okc','Oklahoma City Thunder':'okc',
  'Boston Celtics':'bos','New York Knicks':'ny',
  'Cleveland Cavaliers':'cle','Detroit Pistons':'det',
  'Atlanta Hawks':'atl','Toronto Raptors':'tor',
  'Houston Rockets':'hou','Minnesota Timberwolves':'min',
  'Denver Nuggets':'den','Los Angeles Lakers':'lal',
  'Dallas Mavericks':'dal','Phoenix Suns':'phx',
  'Portland Trail Blazers':'por','Golden State Warriors':'gs',
  'LA Clippers':'lac','San Antonio Spurs':'sa',
  'Memphis Grizzlies':'mem','Miami Heat':'mia',
  'Philadelphia 76ers':'phi','Orlando Magic':'orl',
  'Charlotte Hornets':'cha','Sacramento Kings':'sac',
  'New Orleans Pelicans':'no','Utah Jazz':'utah',
  'Milwaukee Bucks':'mil','Indiana Pacers':'ind',
  'Chicago Bulls':'chi','Brooklyn Nets':'bkn',
  'Washington Wizards':'wsh',
};
function logo(team, override) {
  if (override) return override;
  const code = LOGOS[team];
  return code ? `https://a.espncdn.com/combiner/i?img=/i/teamlogos/nba/500/${code}.png` : null;
}

const RNAME = {1:'1라운드',2:'세미파이널',3:'컨퍼런스 파이널',4:'🏆 파이널'};
const SCORES = ['4-0','4-1','4-2','4-3'];

let CU=null, games=[], savedPicks={}, localPicks={}, pickRates={}, settings={};

// ── SHA256 ──
async function sha256(s){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
// ── IP 조회 ──
async function getIP(){try{const r=await fetch('https://api.ipify.org?format=json');const d=await r.json();return d.ip;}catch{return null;}}

// ── 로그인 ──
function stab(t,btn){
  document.querySelectorAll('.tpill').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  document.getElementById('form-login').style.display=t==='login'?'':'none';
  document.getElementById('form-reg').style.display=t==='reg'?'':'none';
  document.getElementById('ltoast').textContent='';
}
function toast(msg,ok=false){const el=document.getElementById('ltoast');el.textContent=msg;el.className='toast '+(ok?'ok':'err');}

async function doLogin(){
  const nick=document.getElementById('l-nick').value.trim();
  const pin=document.getElementById('l-pin').value.trim();
  if(!nick||pin.length!==4)return toast('닉네임과 4자리 PIN을 입력하세요.');
  const btn=document.querySelector('#form-login .btn');
  btn.disabled=true;btn.textContent='확인 중...';
  try{
    const hash=await sha256(pin);
    const{data,error}=await sb.from('users').select('*').eq('nickname',nick).eq('pin_hash',hash).single();
    if(error||!data){toast('닉네임 또는 PIN이 맞지 않습니다.');btn.disabled=false;btn.textContent='로그인';return;}
    CU=data;lsSet('user',data);initMain();
  }catch(e){toast('오류: '+e.message);btn.disabled=false;btn.textContent='로그인';}
}

async function doReg(){
  const nick=document.getElementById('r-nick').value.trim();
  const pin=document.getElementById('r-pin').value.trim();
  const pin2=document.getElementById('r-pin2').value.trim();
  if(!nick)return toast('닉네임을 입력하세요.');
  if(!/^\d{4}$/.test(pin))return toast('PIN은 숫자 4자리여야 합니다.');
  if(pin!==pin2)return toast('PIN이 일치하지 않습니다.');
  const btn=document.querySelector('#form-reg .btn');
  btn.disabled=true;btn.textContent='등록 중...';
  try{
    const [hash,ip]=await Promise.all([sha256(pin),getIP()]);
    const ua=navigator.userAgent.substring(0,200);
    const{data,error}=await sb.from('users').insert({nickname:nick,pin_hash:hash,ip_address:ip,user_agent:ua}).select().single();
    if(error){if(error.code==='23505')toast('이미 사용 중인 닉네임입니다.');else toast('오류: '+error.message);btn.disabled=false;btn.textContent='참가 신청';return;}
    CU=data;lsSet('user',data);toast('✅ 참가 완료!',true);setTimeout(initMain,700);
  }catch(e){toast('오류: '+e.message);btn.disabled=false;btn.textContent='참가 신청';}
}

function logout(){if(!confirm('로그아웃 하시겠습니까?'))return;lsDel('user');location.reload();}

// ── 메인 초기화 ──
async function initMain(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-screen').style.display='block';
  document.getElementById('uchip').style.display='';
  document.getElementById('unick').textContent=CU.nickname;
  try{await loadSettings();await loadAll();}catch(e){console.error(e);}
  renderBracket();
}

async function loadSettings(){
  const{data}=await sb.from('settings').select('*');
  if(!data)return;
  data.forEach(r=>settings[r.key]=r.value);
  if(settings.event_title)document.getElementById('ev-title').textContent=settings.event_title;
}

async function loadAll(){
  const[g,p,pr]=await Promise.all([
    sb.from('games').select('*').order('round').order('game_order'),
    sb.from('picks').select('*').eq('user_id',CU.id),
    sb.from('pickrate_view').select('*'),
  ]);
  games=g.data||[];
  savedPicks={};localPicks={};
  (p.data||[]).forEach(pk=>{savedPicks[pk.game_id]=pk;localPicks[pk.game_id]={picked_winner:pk.picked_winner,finals_score:pk.finals_score};});
  pickRates={};
  (pr.data||[]).forEach(r=>{
    if(!pickRates[r.game_id])pickRates[r.game_id]={};
    pickRates[r.game_id][r.picked_winner]={count:r.pick_count,pct:parseFloat(r.pct)};
  });
}

// ── 브래킷 렌더링 ──────────────────────────────────
function renderBracket(){
  const arena=document.getElementById('bracket-arena');
  const showPR=settings.show_pickrate==='true';

  if(!games.length){
    document.getElementById('bnotice').textContent='⏳ 관리자가 브래킷을 설정 중입니다. 잠시 후 새로고침 해주세요.';
    document.getElementById('save-bar').style.display='none';
    arena.innerHTML='<svg id="blines"></svg>';
    return;
  }

  // 게임 그룹화
  const G={WEST:{1:[],2:[],3:[]},EAST:{1:[],2:[],3:[]},FINALS:[]};
  games.forEach(g=>{
    if(g.round===4)G.FINALS.push(g);
    else if(g.conference==='WEST'&&g.round<=3)G.WEST[g.round].push(g);
    else if(g.conference==='EAST'&&g.round<=3)G.EAST[g.round].push(g);
  });
  [G.WEST[1],G.WEST[2],G.WEST[3],G.EAST[1],G.EAST[2],G.EAST[3]].forEach(arr=>arr.sort((a,b)=>a.game_order-b.game_order));

  const proj=calcProj();
  const showPRfn=(game)=>showPR||(settings.pickrate_after_lock==='true'&&game.is_locked);

  function col(id,label,gamesArr,isGold=false){
    let h=`<div class="rcol" id="${id}">`;
    h+=`<div class="round-label ${isGold?'gold':''}">${label}</div>`;
    gamesArr.forEach(game=>h+=mcCard(game,proj,showPRfn(game)));
    h+='</div>';
    return h;
  }

  // 파이널 카드
  const fg=G.FINALS[0]||null;
  let finalsHtml=`<div class="finals-center">`;
  finalsHtml+=`<div class="round-label gold">🏆 파이널</div>`;
  finalsHtml+=fg?mcCard(fg,proj,showPRfn(fg)):'<div class="mc"><div class="mc-hdr">대기중</div></div>';
  finalsHtml+='</div>';

  const html=
    col('col-w1','1라운드',G.WEST[1])+
    col('col-w2','세미파이널',G.WEST[2])+
    col('col-w3','컨퍼런스 파이널',G.WEST[3],true)+
    finalsHtml+
    col('col-e3','컨퍼런스 파이널',G.EAST[3],true)+
    col('col-e2','세미파이널',G.EAST[2])+
    col('col-e1','1라운드',G.EAST[1]);

  arena.innerHTML=`<svg id="blines"></svg>${html}`;

  // 공지 업데이트
  const lockable=games.filter(g=>g.team1&&g.team2&&!g.is_locked&&!g.winner);
  const notice=document.getElementById('bnotice');
  if(!lockable.length)notice.textContent='🔒 예측이 마감되었습니다. 결과를 기다려주세요.';
  else notice.innerHTML='⚠️ <b>1라운드부터 파이널까지</b> 전체를 예측하세요. 팀을 고르면 다음 라운드에 자동 반영됩니다.';

  updateSaveBar();
  requestAnimationFrame(()=>requestAnimationFrame(drawLines));
}

// 경기 카드 HTML 생성
function mcCard(game,proj,showPR){
  const pick=localPicks[game.id];
  const saved=savedPicks[game.id];
  const locked=game.is_locked||!!game.winner;

  // 팀 정보 (DB or 이전 라운드 픽에서 projected)
  const t1=teamInfo(game,'team1',proj);
  const t2=teamInfo(game,'team2',proj);

  let cls='mc'+(pick?.picked_winner?' hp':'')+(locked?' locked':'');
  let html=`<div class="${cls}" id="mc-${game.id}">`;
  html+=`<div class="mc-hdr"><span>${game.conference||''}${game.round===4?'':' R'+game.round}</span>`;
  if(game.winner)html+=`<span class="bgd">결과발표</span>`;
  else if(game.is_locked)html+=`<span class="bgl">🔒</span>`;
  html+='</div>';

  if(!t1&&!t2){
    html+=`<div style="padding:12px 10px;color:var(--mu);font-size:0.72rem;text-align:center">이전 라운드를<br>먼저 예측하세요</div>`;
  }else{
    [t1,t2].forEach((ti,idx)=>{
      if(!ti){html+=`<button class="tb tbd-t" disabled><div class="lph">?</div><span class="tn tbd-n">대기중</span></button>`;return;}
      const isPicked=pick?.picked_winner===ti.name;
      const isWinner=game.winner===ti.name;
      const isLoser=game.winner&&game.winner!==ti.name;
      let cls2='tb';
      if(isPicked)cls2+=' picked';
      if(isWinner)cls2+=' winner-r';
      if(isLoser)cls2+=' loser-r';
      if(!ti.fixed&&!game.winner)cls2+=' inferred'; // 예측값은 클릭 가능하나 이탤릭 표시

      const lgSrc=ti.logo;
      const lgHtml=lgSrc
        ?`<img class="lg" src="${lgSrc}" onerror="this.style.display='none'">`
        :`<div class="lph">${ti.name.split(' ').map(w=>w[0]).slice(0,3).join('')}</div>`;

      let icon='';
      if(game.winner&&saved?.picked_winner===ti.name)icon=saved.is_correct?'<span class="cok">✅</span>':'<span class="cno">❌</span>';
      else if(isPicked)icon='<span class="star">★</span>';

      html+=`<button class="${cls2}"
        onclick="pickTeam(${game.id},'${ti.name.replace(/'/g,"\\'")}')"
        ${locked?'disabled':''}>
        ${lgHtml}<span class="tn${!ti.fixed&&!game.winner?' tbd-n':''}">${ti.name}</span>${icon}
      </button>`;
    });
  }

  // 픽률 바
  if(showPR&&t1&&t2){
    const pr=pickRates[game.id]||{};
    const p1=pr[t1.name]?.pct||0;const p2=pr[t2.name]?.pct||0;
    const total=(pr[t1.name]?.count||0)+(pr[t2.name]?.count||0);
    if(total>0){
      html+=`<div style="display:flex;height:18px;border-top:1px solid var(--bd);font-size:0.65rem;font-weight:700;overflow:hidden">
        <div style="background:rgba(200,16,46,.35);width:${Math.max(p1,4)}%;display:flex;align-items:center;padding:0 4px;color:#fff">${p1}%</div>
        <div style="background:rgba(100,100,100,.2);color:var(--mu);display:flex;align-items:center;padding:0 3px;white-space:nowrap;font-size:0.6rem">${total}명</div>
        <div style="background:rgba(29,66,138,.45);flex:1;display:flex;align-items:center;justify-content:flex-end;padding:0 4px;color:#fff">${p2}%</div>
      </div>`;
    }
  }

  // 파이널 스코어
  if(game.round===4&&t1&&t2){
    const sel=pick?.finals_score;
    html+=`<div class="fscore"><div class="fl">시리즈 스코어 예측</div>
      <div class="schips">${SCORES.map(s=>`<button class="sc${sel===s?' on':''}"
        onclick="pickScore(${game.id},'${s}')" ${locked?'disabled':''}>${s}</button>`).join('')}</div>
      ${game.finals_score?`<div class="sc-result">실제: ${game.finals_score}</div>`:''}
    </div>`;
  }

  html+='</div>';
  return html;
}

// 팀 정보 추출 (DB 확정 or 이전 픽에서 예측)
function teamInfo(game,slot,proj){
  const dbTeam=game[slot];
  const dbLogo=game[slot+'_logo'];
  if(dbTeam&&dbTeam!=='TBD')return{name:dbTeam,logo:logo(dbTeam,dbLogo),fixed:true};
  const slotNum=slot==='team1'?1:2;
  const p=proj[`${game.id}_${slotNum}`];
  if(p)return{name:p.name,logo:p.logo,fixed:false}; // 예측값 - 클릭 가능
  return null;
}

// 픽에서 다음 라운드 팀 예측 계산 (NBA 브래킷 룰 하드코딩)
// R1: game_order 1=1v8, 2=4v5, 3=2v7, 4=3v6
// 1+2 승자 → R2 order=1 / 3+4 승자 → R2 order=2
function calcProj(){
  const proj={};
  function win(conf,round,order){
    const g=games.find(x=>x.conference===conf&&x.round===round&&x.game_order===order);
    if(!g)return null;
    const w=g.winner||(localPicks[g.id]?.picked_winner);
    if(!w)return null;
    return{name:w,logo:w===g.team1?logo(g.team1,g.team1_logo):logo(g.team2,g.team2_logo)};
  }
  ['WEST','EAST'].forEach(conf=>{
    const r2a=games.find(x=>x.conference===conf&&x.round===2&&x.game_order===1);
    const r2b=games.find(x=>x.conference===conf&&x.round===2&&x.game_order===2);
    const r3 =games.find(x=>x.conference===conf&&x.round===3);
    if(r2a){const a=win(conf,1,1);if(a)proj[`${r2a.id}_1`]=a; const b=win(conf,1,2);if(b)proj[`${r2a.id}_2`]=b;}
    if(r2b){const c=win(conf,1,3);if(c)proj[`${r2b.id}_1`]=c; const d=win(conf,1,4);if(d)proj[`${r2b.id}_2`]=d;}
    if(r3) {const e=win(conf,2,1);if(e)proj[`${r3.id}_1`] =e; const f=win(conf,2,2);if(f)proj[`${r3.id}_2`] =f;}
  });
  const fin=games.find(x=>x.round===4);
  if(fin){const w=win('WEST',3,1);if(w)proj[`${fin.id}_1`]=w; const e=win('EAST',3,1);if(e)proj[`${fin.id}_2`]=e;}
  return proj;
}

function pickTeam(gameId,team){
  if(!localPicks[gameId])localPicks[gameId]={};
  localPicks[gameId].picked_winner=team;
  renderBracket(); // 전체 재렌더 (다음 라운드 propagation 반영)
}

function pickScore(gameId,score){
  if(!localPicks[gameId])localPicks[gameId]={};
  localPicks[gameId].finals_score=score;
  // 파이널 카드만 갱신
  const game=games.find(g=>g.id===gameId);
  const proj=calcProj();
  const showPR=settings.show_pickrate==='true'||((settings.pickrate_after_lock==='true')&&game.is_locked);
  const card=document.getElementById(`mc-${gameId}`);
  if(card){const tmp=document.createElement('div');tmp.innerHTML=mcCard(game,proj,showPR);card.replaceWith(tmp.firstChild);}
  updateSaveBar();
}

function updateSaveBar(){
  const bar=document.getElementById('save-bar');
  const proj=calcProj();
  // 팀이 확정되었거나 이전 픽으로 예측 가능한 경기 모두 포함
  const avail=games.filter(g=>{
    if(g.is_locked||g.winner)return false;
    const t1ok=(g.team1&&g.team1!=='TBD')||!!proj[`${g.id}_1`];
    const t2ok=(g.team2&&g.team2!=='TBD')||!!proj[`${g.id}_2`];
    return t1ok&&t2ok;
  });
  if(!avail.length){bar.style.display='none';return;}
  bar.style.display='flex';
  const done=avail.filter(g=>localPicks[g.id]?.picked_winner).length;
  document.getElementById('p-done').textContent=done;
  document.getElementById('p-total').textContent=avail.length;
}

async function submitPicks(){
  const btn=document.getElementById('save-btn');
  btn.disabled=true;btn.textContent='저장 중...';
  const rows=Object.entries(localPicks)
    .filter(([,p])=>p.picked_winner)
    .map(([gid,p])=>({user_id:CU.id,game_id:parseInt(gid),picked_winner:p.picked_winner,finals_score:p.finals_score||null,updated_at:new Date().toISOString()}));
  const{error}=await sb.from('picks').upsert(rows,{onConflict:'user_id,game_id'});
  if(error)alert('저장 실패: '+error.message);
  else{await loadAll();renderBracket();alert(`✅ ${rows.length}개 예측 저장!`);}
  btn.disabled=false;btn.textContent='💾 저장';
}

// ── SVG 브래킷 연결선 (NBA 브래킷 룰 하드코딩) ──
function drawLines(){
  const arena=document.getElementById('bracket-arena');
  const svg=document.getElementById('blines');
  if(!arena||!svg)return;
  svg.innerHTML='';
  const ar=arena.getBoundingClientRect();
  svg.setAttribute('viewBox',`0 0 ${ar.width} ${ar.height}`);

  // 연결쌍 계산: [fromId, toId, isEastSide]
  const pairs=[];
  ['WEST','EAST'].forEach(conf=>{
    const isE=conf==='EAST';
    const r1=games.filter(x=>x.conference===conf&&x.round===1).sort((a,b)=>a.game_order-b.game_order);
    const r2=games.filter(x=>x.conference===conf&&x.round===2).sort((a,b)=>a.game_order-b.game_order);
    const r3=games.find(x=>x.conference===conf&&x.round===3);
    // R1→R2
    if(r2[0]&&r1[0])pairs.push([r1[0].id,r2[0].id,isE]);
    if(r2[0]&&r1[1])pairs.push([r1[1].id,r2[0].id,isE]);
    if(r2[1]&&r1[2])pairs.push([r1[2].id,r2[1].id,isE]);
    if(r2[1]&&r1[3])pairs.push([r1[3].id,r2[1].id,isE]);
    // R2→CF
    if(r3&&r2[0])pairs.push([r2[0].id,r3.id,isE]);
    if(r3&&r2[1])pairs.push([r2[1].id,r3.id,isE]);
    // CF→Finals
    const fin=games.find(x=>x.round===4);
    if(fin&&r3)pairs.push([r3.id,fin.id,isE]);
  });

  pairs.forEach(([fromId,toId,isEast])=>{
    const from=document.getElementById(`mc-${fromId}`);
    const to=document.getElementById(`mc-${toId}`);
    if(!from||!to)return;
    const fr=from.getBoundingClientRect();
    const tr=to.getBoundingClientRect();
    // WEST: 카드 오른쪽 → 다음 카드 왼쪽
    // EAST: 카드 왼쪽 → 다음 카드 오른쪽
    const x1=isEast?fr.left-ar.left:fr.right-ar.left;
    const y1=fr.top+fr.height/2-ar.top;
    const x2=isEast?tr.right-ar.left:tr.left-ar.left;
    const y2=tr.top+tr.height/2-ar.top;
    const mx=(x1+x2)/2;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${x1},${y1} H${mx} V${y2} H${x2}`);
    path.setAttribute('stroke','#2a3550');
    path.setAttribute('stroke-width','1.5');
    path.setAttribute('fill','none');
    path.setAttribute('stroke-linecap','round');
    svg.appendChild(path);
  });
}

// ── 내 예측 ──────────────────────────────────────
async function renderMyPicks(){
  const body=document.getElementById('mp-body');
  await loadAll();
  if(!Object.keys(savedPicks).length){body.innerHTML='<div class="empty">아직 제출한 예측이 없습니다.</div>';return;}
  const W={1:1,2:2,3:4,4:8};
  let total=0,html='';
  [1,2,3,4].forEach(r=>{
    const rg=games.filter(g=>g.round===r&&savedPicks[g.id]);
    if(!rg.length)return;
    html+=`<div class="mp-rhdr">${RNAME[r]}</div>`;
    rg.forEach(game=>{
      const pk=savedPicks[game.id];
      let badge=`<span class="rb rb-wt">⏳</span>`;
      if(game.winner){
        if(pk.is_correct){
          let pt=W[game.round];
          if(game.round===4&&pk.finals_score===game.finals_score)pt+=4;
          total+=pt;
          badge=`<span class="rb rb-ok">+${pt}점</span>`;
        }else badge=`<span class="rb rb-no">❌</span>`;
      }
      html+=`<div class="mp-card">
        <div>
          <div class="mp-match">${game.team1||'?'} vs ${game.team2||'?'}</div>
          <div class="mp-team">${pk.picked_winner}${pk.finals_score?' ('+pk.finals_score+')':''}</div>
          ${game.winner?`<div class="mp-sub">실제: ${game.winner}${game.finals_score?' '+game.finals_score:''}</div>`:''}
        </div>${badge}</div>`;
    });
  });
  html+=`<div class="my-total">누적 점수: ${total}점</div>`;
  body.innerHTML=html;
}

// ── 순위표 ──────────────────────────────────────
async function loadLb(){
  const body=document.getElementById('lb-body');
  body.innerHTML='<div class="spin-c"><div class="sp"></div></div>';
  const{data}=await sb.from('leaderboard').select('*');
  if(!data?.length){body.innerHTML='<div class="empty">아직 데이터 없음</div>';return;}
  let html=`<div class="lb-hdr"><span>순위</span><span>닉네임</span><span style="text-align:right">정답</span><span style="text-align:right">점수</span></div>`;
  data.forEach((row,i)=>{
    const isMe=row.nickname===CU.nickname;
    const em=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    html+=`<div class="lb-row${isMe?' me':''}">
      <div class="rno ${i<3?`r${i+1}c`:''}">${em||i+1}</div>
      <div>${row.nickname}${isMe?' <span style="font-size:.68rem;color:var(--gold)">(나)</span>':''}</div>
      <div class="cr-cell">${row.correct}/${row.judged}</div>
      <div class="sc-cell">${row.score}</div>
    </div>`;
  });
  body.innerHTML=html;
  document.getElementById('lb-ts').textContent='방금 업데이트';
}

// ── 패널 전환 ──
function showPanel(name,btn){
  ['bracket','mypicks','lb'].forEach(p=>{
    const el=document.getElementById(`panel-${p}`);
    el.classList.remove('on');el.style.display='none';
  });
  const t=document.getElementById(`panel-${name}`);
  t.classList.add('on');t.style.display='block';
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(name==='lb')loadLb();
  if(name==='mypicks')renderMyPicks();
  if(name==='bracket'){updateSaveBar();requestAnimationFrame(()=>requestAnimationFrame(drawLines));}
}

// ── localStorage ──
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function lsGet(k){try{return JSON.parse(localStorage.getItem(k));}catch{return null;}}
function lsDel(k){try{localStorage.removeItem(k);}catch{}}

// 브라우저 리사이즈 시 라인 재계산
window.addEventListener('resize',()=>{if(CU&&document.getElementById('panel-bracket').classList.contains('on'))requestAnimationFrame(drawLines);});

// ── 초기화 ──
window.onload=async()=>{
  const stored=lsGet('user');
  if(stored){const{data}=await sb.from('users').select('*').eq('id',stored.id).single();if(data){CU=data;initMain();return;}lsDel('user');}
};
